providers = ["node"]

[variables]
NODE_ENV = "production"
NIXPACKS_NODE_VERSION = "20.19.0"

[phases.install]
cmds = [
  "cd app && env -u NPM_CONFIG_PRODUCTION npm ci --legacy-peer-deps",
  "cd backend && env -u NPM_CONFIG_PRODUCTION npm ci --legacy-peer-deps"
]

[phases.build]
cmds = [
  "cd app && env -u NPM_CONFIG_PRODUCTION npm run build"
]

[start]
cmd = "cd backend && exec node server.js"
