providers = ["node"]

[variables]
NODE_ENV = "production"
NIXPACKS_NODE_VERSION = "20"

[phases.install]
cmds = [
  "cd app && npm ci --legacy-peer-deps",
  "cd backend && npm ci --legacy-peer-deps"
]

[phases.build]
cmds = [
  "cd app && npm run build"
]

[start]
cmd = "cd backend && exec node server.js"
