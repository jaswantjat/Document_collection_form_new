version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 19
  - Vite
  - Tailwind CSS
  - shadcn/ui (Radix UI)
  - React Router v6
  - react-hook-form
  - zod
  - pdfjs-dist
  - react-signature-canvas
  - Node.js / Express (backend)

routing_notes: >
  IMPORTANT: This is a pure SPA. ALL customer routes are accessed via the root
  path with a query param: /?code=ELTXXXXXX (e.g. /?code=ELT20250001).
  There are NO path-based customer routes like /property-docs or /review.
  The app uses internal React state to switch between sections (property-docs,
  province-selection, representation, energy-certificate, review, success).
  To test a specific section, navigate to /?code=ELTXXXXXX and the app routes
  automatically to the correct step based on form completion state.
  Test project ELT20250004 and ELT20250005 are pre-seeded for energy-certificate flow.

routes:
  - path: /
    file: app/src/App.tsx
    auth_required: false
    description: Phone entry (no code). Navigate here and enter phone to find project.
  - path: /?code=ELT20250001
    file: app/src/App.tsx
    auth_required: false
    description: Solar project — starts at property-docs step. All customer sections accessed via this root URL.
  - path: /?code=ELT20250002
    file: app/src/App.tsx
    auth_required: false
    description: Aerothermal project
  - path: /?code=ELT20250004
    file: app/src/App.tsx
    auth_required: false
    description: Solar project pre-seeded for energy-certificate flow testing
  - path: /?code=ELT20250005
    file: app/src/App.tsx
    auth_required: false
    description: Energy certificate flow test project
  - path: /dashboard
    file: app/src/pages/Dashboard.tsx
    auth_required: true
    description: Admin dashboard. Password = eltex2025. Enter at /dashboard login page.

features:
  - name: Phone Number Entry
    description: Customer enters their Spanish mobile number. System looks up their project and redirects to the form with ?code=ELTXXXXXX.
    files:
      - app/src/sections/PhoneSection.tsx
      - app/src/services/api.ts
    entry_route: /
    user_interactions:
      - Type phone number into input field
      - Click "Continuar" button to submit
      - See error message if number not found
      - Get redirected to /?code=ELTXXXXXX on success
    api_calls:
      - method: POST
        endpoint: /api/lookup-phone
    auth_required: false

  - name: Property Document Upload
    description: Customer uploads identity document (DNI/NIE), IBI certificate, and electricity bill. AI extracts data from each document automatically.
    files:
      - app/src/sections/PropertyDocsSection.tsx
      - app/src/components/PhotoUpload.tsx
      - app/src/lib/identityDocument.ts
      - app/src/lib/photoValidation.ts
    entry_route: /?code=ELT20250001
    user_interactions:
      - Tap camera icon to upload DNI/NIE front photo
      - Review AI-extracted name, DNI number, expiry date
      - Tap to upload DNI back photo (required for card-front-only uploads)
      - Tap to upload IBI certificate photo or PDF
      - Tap to upload electricity bill (one or more pages)
      - Click "Siguiente" to proceed to province selection
    api_calls:
      - method: POST
        endpoint: /api/extract/dni
      - method: POST
        endpoint: /api/extract/ibi
      - method: POST
        endpoint: /api/extract/electricity-bill
    auth_required: false

  - name: Province Selection
    description: Customer selects their province/region. This determines which legal signing documents are required.
    files:
      - app/src/sections/ProvinceSelectionSection.tsx
      - app/src/lib/provinceMapping.ts
    entry_route: /?code=ELT20250001
    user_interactions:
      - Select province from dropdown or list
      - Click "Siguiente" to proceed
    api_calls: []
    auth_required: false

  - name: Legal Document Signing (Representation)
    description: Customer signs region-specific legal PDFs using a canvas-based signature pad. Cataluña requires 3 signatures, Madrid/Valencia require 2, other provinces skip.
    files:
      - app/src/sections/RepresentationSection.tsx
      - app/src/components/SignaturePad.tsx
      - app/src/lib/signedDocumentOverlays.ts
    entry_route: /?code=ELT20250001
    user_interactions:
      - Draw signature on signature pad canvas
      - Tap "Firmar" to apply signature to document
      - Review signed PDF preview
      - Repeat for each required document
      - Click "Siguiente" to continue
    api_calls:
      - method: POST
        endpoint: /api/sign-documents
    auth_required: false

  - name: Energy Certificate Survey
    description: 4-step survey capturing technical housing data for the energy certificate. Customer signs the completed certificate.
    files:
      - app/src/sections/EnergyCertificateSection.tsx
      - app/src/lib/energyCertificateValidation.ts
      - app/src/lib/energyCertificateDocument.ts
    entry_route: /?code=ELT20250001
    user_interactions:
      - Fill in cadastral reference, habitable area, floor count, bedroom count
      - Enter door and window counts by orientation (N/E/S/W)
      - Select window frame material, glass type, shutter presence
      - Select thermal installation type and boiler fuel
      - Select air conditioning type
      - Select heating emitter type
      - Select product sold (solar panels, aerothermal, or both)
      - Indicate if existing customer, if has solar panels
      - Draw signature on signature pad
      - Click "Finalizar" to complete or "Omitir" to skip
    api_calls:
      - method: POST
        endpoint: /api/projects/:code/submit
    auth_required: false

  - name: Review and Submit
    description: Shows a checklist of all required items with completion status. Customer reviews all items and submits to Eltex.
    files:
      - app/src/sections/ReviewSection.tsx
    entry_route: /?code=ELT20250001
    user_interactions:
      - View checklist of all submitted items
      - Click incomplete items to go back and fix them
      - Click "Enviar documentación" to submit
      - See success screen after submission
    api_calls:
      - method: POST
        endpoint: /api/projects/:code/submit
    auth_required: false

  - name: Admin Dashboard
    description: Password-protected dashboard for Eltex assessors to view submitted projects, review documents, and download ZIPs.
    files:
      - app/src/pages/Dashboard.tsx
      - app/src/pages/DashboardLogin.tsx
    entry_route: /dashboard
    user_interactions:
      - Enter password "eltex2025" to log in
      - View list of all submitted projects
      - Click a project to view its details
      - View uploaded document images and extracted data
      - Click "Descargar ZIP" to download all project files
      - Click "Exportar CSV" to export project list
      - Click "Cerrar sesión" to log out
    api_calls:
      - method: GET
        endpoint: /api/dashboard/projects
      - method: GET
        endpoint: /api/dashboard/projects/:code
      - method: GET
        endpoint: /api/dashboard/projects/:code/download
    auth_required: true

known_limitations:
  - issue: Photos are stored as base64 in localStorage/IndexedDB — not sent to server during extraction, only metadata is synced
    location: app/src/hooks/useFormState.ts
    impact: Large images may hit localStorage quota on older devices
  - issue: Autocropper Python service may not be running in development
    location: autocropper/app.py
    impact: Document photos will not be auto-straightened before AI extraction
  - issue: Province "other" is no longer a user-selectable option but exists in legacy data
    location: app/src/lib/provinceMapping.ts
    impact: Old projects with location="other" will skip signing section correctly
