<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Certificate Debug</title></head>
<body style="margin:0;background:#888;">
<canvas id="c"></canvas>
<script>
const PAGE = { w: 2481, h: 3509 };

const BOXES = {
  customerName:            [1245, 329,  2100, 395],
  isExistingCustomer:      [1245, 408,  2100, 474],
  address:                 [1245, 488,  2100, 554],
  phone:                   [1245, 566,  2100, 632],
  email:                   [1245, 647,  2100, 713],
  dniNumber:               [1245, 726,  2100, 792],
  assessor:                [1245, 805,  2100, 872],
  formDate:                [1245, 885,  2100, 951],
  soldProduct:             [1245, 964,  2100, 1030],
  cadastralReference:      [1245, 1364, 2100, 1430],
  habitableAreaM2:         [1245, 1443, 2100, 1508],
  floorCount:              [1245, 1522, 2100, 1588],
  averageFloorHeight:      [1245, 1601, 2100, 1668],
  bedroomCount:            [1245, 1680, 2100, 1747],
  windowFrameMaterial:     [1245, 1955, 2100, 2032],
  doorMaterial:            [1245, 2036, 2100, 2113],
  windowGlassType:         [1245, 2117, 2100, 2194],
  hasShutters:             [1245, 2198, 2100, 2275],
  shutterWindowCount:      [1245, 2279, 2100, 2361],
  thermalInstallationType: [1245, 2365, 2100, 2442],
  boilerFuelType:          [1245, 2446, 2100, 2523],
  equipmentDetails:        [1245, 2527, 2100, 2604],
  heatingEmitterType:      [1245, 2608, 2100, 2685],
  radiatorMaterial:        [1245, 2689, 2100, 2771],
  hasAirConditioning:      [1245, 2775, 2100, 2853],
  airConditioningDetails:  [1245, 2857, 2100, 2934],
  hasSolarPanels:          [1245, 2938, 2100, 3015],
  solarPanelDetails:       [1245, 3019, 2100, 3096],
  signature:               [1045, 3215, 1900, 3415],
};

const DISPLAY_SCALE = 0.3;
const canvas = document.getElementById('c');
canvas.width  = PAGE.w * DISPLAY_SCALE;
canvas.height = PAGE.h * DISPLAY_SCALE;
const ctx = canvas.getContext('2d');

const img = new Image();
img.src = '/cert-template.jpg';
img.onload = () => {
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  
  const colors = ['#ff000088','#00aa0088','#0000ff88','#ff880088'];
  let ci = 0;
  for (const [key, box] of Object.entries(BOXES)) {
    const x1 = box[0] * DISPLAY_SCALE;
    const y1 = box[1] * DISPLAY_SCALE;
    const x2 = box[2] * DISPLAY_SCALE;
    const y2 = box[3] * DISPLAY_SCALE;
    ctx.strokeStyle = colors[ci % colors.length];
    ctx.lineWidth = 2;
    ctx.strokeRect(x1, y1, x2-x1, y2-y1);
    ctx.fillStyle = colors[ci % colors.length];
    ctx.font = '8px monospace';
    ctx.fillText(key.slice(0,12), x1+2, y1+10);
    ci++;
  }
};
</script>
</body>
</html>
