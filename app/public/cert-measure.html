<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Measure</title></head>
<body>
<canvas id="c" style="display:none"></canvas>
<pre id="out" style="font-size:10px;line-height:1.25;column-count:2;column-gap:40px"></pre>
<script>
const img = new Image();
img.src = '/cert-template.jpg';
img.onload = () => {
  const canvas = document.getElementById('c');
  canvas.width = img.width;
  canvas.height = img.height;
  const ctx = canvas.getContext('2d',{willReadFrequently:true});
  ctx.drawImage(img, 0, 0);

  // Scan at x=1400 (in value column, no text) to find table borders
  const xProbe = 1400;
  const data = ctx.getImageData(xProbe, 0, 1, img.height).data;
  const borders = [];
  let inDark = false;
  for (let y = 0; y < img.height; y++) {
    const idx = y * 4;
    const luma = 0.299*data[idx] + 0.587*data[idx+1] + 0.114*data[idx+2];
    if (luma < 100 && !inDark) {
      inDark = true;
      borders.push(y);
    } else if (luma >= 100) {
      inDark = false;
    }
  }

  // Find row centers (midpoints between successive borders)
  let out = `Borders at x=${xProbe}:\n` + borders.join(', ') + '\n\n';
  out += 'Gaps & midpoints:\n';
  for (let i = 1; i < borders.length; i++) {
    const gap = borders[i] - borders[i-1];
    const mid = Math.round((borders[i-1] + borders[i]) / 2);
    if (gap > 20) { // Skip tiny sub-borders
      out += `  [${borders[i-1]}-${borders[i]}] gap=${gap} mid=${mid}\n`;
    }
  }
  document.getElementById('out').textContent = out;
};
</script>
</body>
</html>
